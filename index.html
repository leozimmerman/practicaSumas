<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practica de Sumas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #e94560;
    }

    .subtitle {
      color: #a8b2d8;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    /* Start screen */
    #start-screen { display: block; }

    .start-description {
      color: #a8b2d8;
      margin-bottom: 36px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .mode-label {
      color: #a8b2d8;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .mode-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-mode {
      padding: 20px 32px;
      font-size: 1.05rem;
      font-weight: bold;
      border: 2px solid transparent;
      border-radius: 16px;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      min-width: 160px;
    }

    .btn-mode:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .btn-mode-impares {
      background: linear-gradient(135deg, #e94560, #c0392b);
    }

    .btn-mode-pares {
      background: linear-gradient(135deg, #0099cc, #0f3460);
      border-color: rgba(255,255,255,0.2);
    }

    .mode-tag {
      font-size: 0.75rem;
      display: block;
      opacity: 0.8;
      margin-top: 4px;
      font-weight: normal;
    }

    /* Score & progress */
    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #a8b2d8;
    }

    .score { font-size: 1.1rem; font-weight: bold; color: #e94560; }

    .timer { font-size: 1.1rem; font-weight: bold; color: #f5a623; }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* Question card */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 30px;
      margin-bottom: 28px;
      backdrop-filter: blur(10px);
    }

    .question {
      font-size: 3.5rem;
      font-weight: bold;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .hint {
      color: #a8b2d8;
      font-size: 0.85rem;
      min-height: 20px;
    }

    /* Answer input */
    .answer-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .input-answer {
      width: 130px;
      padding: 16px 12px;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: white;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-answer:focus {
      border-color: #e94560;
    }

    .input-answer.correct {
      border-color: #2ed573;
      background: rgba(46, 213, 115, 0.15);
      animation: pulse 0.4s ease;
    }

    .input-answer.wrong {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.15);
      animation: shake 0.4s ease;
    }

    .btn-submit {
      padding: 16px 28px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #e94560, #f5a623);
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn-submit:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: default;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Feedback message */
    .feedback {
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 28px;
      margin-bottom: 16px;
    }

    .feedback.ok { color: #2ed573; }
    .feedback.fail { color: #e94560; }

    /* Result screen */
    #result-screen { display: none; }

    .result-emoji { font-size: 4rem; margin-bottom: 16px; }
    .result-title { font-size: 2rem; font-weight: bold; margin-bottom: 8px; }
    .result-time {
      font-size: 1.4rem;
      font-weight: bold;
      color: #f5a623;
      margin-bottom: 8px;
    }
    .result-score { font-size: 1.1rem; color: #a8b2d8; margin-bottom: 32px; }

    .stars {
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 2px;
      line-height: 1.4;
    }

    .stars-label {
      font-size: 1rem;
      color: #a8b2d8;
      margin-bottom: 24px;
    }

    .btn-primary {
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      background: linear-gradient(135deg, #e94560, #f5a623);
      border: none;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Start screen -->
  <div id="start-screen">
    <h1>Sumas Rapidas</h1>
    <p class="subtitle">Practica tus cuentas</p>
    <p class="start-description">10 preguntas. Escribe la respuesta y presiona <strong>Confirmar</strong> o <strong>Enter</strong>.<br>Tu tiempo total aparecerá al final.</p>
    <p class="mode-label">Elige un modo:</p>
    <div class="mode-buttons">
      <button class="btn-mode btn-mode-impares" onclick="startGame('impares')">
        Sumas Impares
        <span class="mode-tag">2+3, 3+4, 4+5…</span>
      </button>
      <button class="btn-mode btn-mode-pares" onclick="startGame('pares')">
        Sumas Pares
        <span class="mode-tag">2+2, 3+3, 4+4…</span>
      </button>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game-screen" style="display:none">
    <h1 id="game-title">Sumas Rapidas</h1>
    <p class="subtitle">Escribe la respuesta correcta</p>

    <div class="stats">
      <span>Pregunta <strong id="q-num">1</strong> de 10</span>
      <span class="timer">&#9201; <span id="timer">0:00</span></span>
      <span class="score">Puntos: <span id="score">0</span></span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>

    <div class="card">
      <div class="question" id="question">? + ? = ?</div>
      <div class="hint" id="hint"></div>
    </div>

    <div class="answer-row">
      <input type="number" class="input-answer" id="answer-input" placeholder="?" min="0" autocomplete="off" inputmode="numeric">
      <button class="btn-submit" id="btn-submit" onclick="submitAnswer()">Confirmar</button>
    </div>

    <div class="feedback" id="feedback"></div>
  </div>

  <!-- Result screen -->
  <div id="result-screen">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title" id="result-title"></div>
    <div class="stars" id="stars"></div>
    <div class="stars-label" id="stars-label"></div>
    <div class="result-time" id="result-time"></div>
    <div class="result-score" id="result-score"></div>
    <button class="btn-primary" onclick="backToStart()">Elegir modo</button>
  </div>

</div>

<script>
  const POOLS = {
    impares: [
      { a: 2, b: 3 },
      { a: 3, b: 4 },
      { a: 4, b: 5 },
      { a: 5, b: 6 },
      { a: 7, b: 8 },
      { a: 8, b: 9 },
    ],
    pares: [
      { a: 2, b: 2 },
      { a: 3, b: 3 },
      { a: 4, b: 4 },
      { a: 5, b: 5 },
      { a: 6, b: 6 },
      { a: 7, b: 7 },
      { a: 8, b: 8 },
      { a: 9, b: 9 },
    ],
  };

  const TOTAL = 10;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeQuestions(pool, n) {
    const qs = [];
    let lastKey = null;
    while (qs.length < n) {
      const round = shuffle([...pool]);
      if (lastKey !== null && round[0].a === lastKey) {
        const swapIdx = round.findIndex(q => q.a !== lastKey);
        if (swapIdx > 0) [round[0], round[swapIdx]] = [round[swapIdx], round[0]];
      }
      for (const q of round) {
        if (qs.length < n) qs.push(q);
      }
      lastKey = round[round.length - 1].a;
    }
    return qs;
  }

  let order = [];
  let current = 0;
  let score = 0;
  let answered = false;
  let startTime = null;
  let timerInterval = null;

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const min = Math.floor(s / 60);
    const sec = s % 60;
    return `${min}:${sec.toString().padStart(2, '0')}`;
  }

  function startGame(mode) {
    const pool = POOLS[mode];
    order = makeQuestions(pool, TOTAL);
    current = 0;
    score = 0;
    answered = false;

    const title = mode === 'pares' ? 'Sumas Pares' : 'Sumas Impares';
    document.getElementById('game-title').textContent = title;

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';

    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      document.getElementById('timer').textContent = formatTime(Date.now() - startTime);
    }, 500);

    showQuestion();
  }

  function backToStart() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'block';
  }

  function showQuestion() {
    answered = false;
    const q = order[current];

    document.getElementById('q-num').textContent = current + 1;
    document.getElementById('score').textContent = score;
    document.getElementById('progress').style.width = (current / TOTAL * 100) + '%';
    document.getElementById('question').textContent = `${q.a} + ${q.b} = ?`;
    document.getElementById('hint').textContent = '';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';

    const input = document.getElementById('answer-input');
    input.value = '';
    input.className = 'input-answer';
    input.disabled = false;
    input.focus();

    document.getElementById('btn-submit').disabled = false;
  }

  function submitAnswer() {
    if (answered) return;

    const input = document.getElementById('answer-input');
    const chosen = parseInt(input.value);
    if (isNaN(chosen)) return;

    answered = true;
    input.disabled = true;
    document.getElementById('btn-submit').disabled = true;

    const q = order[current];
    const correct = q.a + q.b;
    const feedback = document.getElementById('feedback');

    if (chosen === correct) {
      input.classList.add('correct');
      score += 10;
      document.getElementById('score').textContent = score;
      feedback.textContent = '¡Correcto! +10 puntos';
      feedback.className = 'feedback ok';
    } else {
      input.classList.add('wrong');
      feedback.textContent = `Incorrecto. La respuesta era ${correct}`;
      feedback.className = 'feedback fail';
    }

    setTimeout(() => {
      current++;
      if (current < TOTAL) {
        showQuestion();
      } else {
        showResult();
      }
    }, 1200);
  }

  function showResult() {
    clearInterval(timerInterval);
    const elapsed = Date.now() - startTime;

    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';

    const correct = score / 10;
    const seconds = elapsed / 1000;

    const accuracyStars = correct * 0.7;
    let timeBonus;
    if (seconds < 80)       timeBonus = 3;
    else if (seconds < 100) timeBonus = 2;
    else if (seconds < 130) timeBonus = 1;
    else                    timeBonus = 0;

    const starCount = Math.min(10, Math.round(accuracyStars + timeBonus));
    const stars = '★'.repeat(starCount) + '☆'.repeat(10 - starCount);

    let emoji, title;
    if (starCount === 10)      { emoji = '🏆'; title = '¡Perfecto!'; }
    else if (starCount >= 8)   { emoji = '🥇'; title = '¡Excelente!'; }
    else if (starCount >= 6)   { emoji = '😊'; title = '¡Muy bien!'; }
    else if (starCount >= 4)   { emoji = '👍'; title = '¡Bien hecho!'; }
    else if (starCount >= 2)   { emoji = '💪'; title = '¡Sigue practicando!'; }
    else                       { emoji = '😅'; title = '¡Sigue intentando!'; }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-title').textContent = title;
    document.getElementById('stars').textContent = stars;
    document.getElementById('stars-label').textContent = `${starCount} de 10 estrellas`;
    document.getElementById('result-time').textContent = `Tiempo: ${formatTime(elapsed)}`;
    document.getElementById('result-score').textContent =
      `${correct} de ${TOTAL} correctas · ${score} puntos`;
  }

  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
  });
</script>
</body>
</html>
